<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了 | Grounded Soar</title>
<link rel="icon" href="images/groundedsoar_logofabicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #FAFAF7;
    --text-main: #4A4643;
    --text-accent: #8C7A6B;
    --btn-color: #B59C8F;
    --btn-hover: #A0887D;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text-main);
    background-color: var(--bg-color);
    line-height: 1.8;
    margin: 0;
    padding: 0;
    letter-spacing: 0.05em;
    text-align: center;
  }

  /* ロゴ・ヘッダー部分 */
  .header {
    text-align: center;
    padding: 0;
    background-color: #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  }

  .logo-container {
    display: inline-block;
  }

  .logo-container a {
    text-decoration: none;
    display: block;
    padding: 20px 0;
  }

  .logo-img {
    max-width: 250px;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  h1 {
    font-family: 'Noto Serif JP', serif;
    color: var(--text-accent);
    font-size: 2rem;
    margin-bottom: 30px;
  }

  .message {
    margin: 30px 0 50px;
    line-height: 2;
  }

  .message p {
    margin: 10px 0;
  }

  .btn {
    display: inline-block;
    background-color: var(--btn-color);
    color: white;
    padding: 18px 50px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 500;
    transition: background-color 0.3s ease;
    box-shadow: 0 4px 10px rgba(181, 156, 143, 0.4);
  }

  .btn:hover {
    background-color: var(--btn-hover);
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo-container">
    <a href="index.html">
      <img src="images/groundedsoar_logo.png" alt="Grounded Soar Logo" class="logo-img">
    </a>
  </div>
</header>

<div class="container">
  <h1>Thank You</h1>
  
  <div class="message">
    <p>お問い合わせを承りました。<br>
    メッセージをお送りいただき、ありがとうございます。</p>
    <p>内容を確認し、48時間以内にご連絡させていただきます。<br>
    今しばらくお待ちくださいませ。</p>
  </div>

  <a href="index.html" class="btn">トップページへ戻る</a>
</div>

</body>
</html>
